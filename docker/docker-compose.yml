name: druksave

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: druksave
      POSTGRES_PASSWORD: druksave
      POSTGRES_DB: druksave
    ports:
      - "5433:5432"
    volumes:
      - druksave_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U druksave -d druksave"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - druksave_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "9091:8080"
    depends_on:
      - postgres

volumes:
  druksave_postgres_data:
  druksave_redis_data:
