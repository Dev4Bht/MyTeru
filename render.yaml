databases:
  - name: druksave-db
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: druksave-api
    runtime: node
    plan: free
    region: singapore
    buildCommand: pnpm install --frozen-lockfile && pnpm exec turbo run build --filter=@druksave/api
    startCommand: node apps/api/dist/src/main.js
    preDeployCommand: pnpm --filter @druksave/database db:migrate:deploy
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_GLOBAL_PREFIX
        value: api
      - key: DATABASE_URL
        fromDatabase:
          name: druksave-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_TTL
        value: 30d
      - key: CORS_ORIGINS
        value: https://druksave-web.onrender.com
      # Must match the OAuth Client ID created at
      # https://console.cloud.google.com/apis/credentials — set manually in
      # the Render dashboard after the blueprint creates this service.
      - key: GOOGLE_CLIENT_ID
        sync: false

  - type: web
    name: druksave-web
    runtime: node
    plan: free
    region: singapore
    buildCommand: pnpm install --frozen-lockfile && pnpm exec turbo run build --filter=@druksave/web
    startCommand: pnpm --filter @druksave/web start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_BASE_URL
        value: https://druksave-api.onrender.com
      - key: API_GLOBAL_PREFIX
        value: api
      # Same Google OAuth Client ID as druksave-api's GOOGLE_CLIENT_ID — this
      # copy is public (NEXT_PUBLIC_) because the Sign-In button needs it in
      # the browser bundle; set manually after the blueprint creates this
      # service, then trigger a redeploy so Next.js inlines it at build time.
      - key: NEXT_PUBLIC_GOOGLE_CLIENT_ID
        sync: false
