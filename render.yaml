databases:
  - name: druksave-db
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: druksave-api
    runtime: node
    plan: free
    region: singapore
    buildCommand: pnpm install --frozen-lockfile && pnpm exec turbo run build --filter=@druksave/api
    startCommand: node apps/api/dist/src/main.js
    preDeployCommand: pnpm --filter @druksave/database db:migrate:deploy
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_GLOBAL_PREFIX
        value: api
      - key: DATABASE_URL
        fromDatabase:
          name: druksave-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_TTL
        value: 30d
      - key: CORS_ORIGINS
        value: https://druksave-web.onrender.com
      - key: ARGON2_MEMORY_COST
        value: "19456"
      - key: ARGON2_TIME_COST
        value: "2"
      - key: ARGON2_PARALLELISM
        value: "1"
      - key: LOGIN_MAX_ATTEMPTS
        value: "5"
      - key: LOGIN_LOCKOUT_MINUTES
        value: "15"

  - type: web
    name: druksave-web
    runtime: node
    plan: free
    region: singapore
    buildCommand: pnpm install --frozen-lockfile && pnpm exec turbo run build --filter=@druksave/web
    startCommand: pnpm --filter @druksave/web start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_BASE_URL
        value: https://druksave-api.onrender.com
      - key: API_GLOBAL_PREFIX
        value: api
