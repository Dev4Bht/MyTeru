[build]
  publish = "apps/web/.next"
  command = "pnpm install --no-frozen-lockfile && pnpm build"

[build.environment]
  NODE_VERSION = "22"
  # prisma generate only needs a syntactically valid connection string at
  # build time (it doesn't connect to the DB); the real runtime connection
  # goes through the Neon driver adapter via @netlify/database instead.
  DATABASE_URL = "postgresql://placeholder:placeholder@localhost:5432/placeholder?schema=public"

[functions]
  directory = "apps/api/netlify/functions"
  node_bundler = "esbuild"
  # @nestjs/core references its optional microservices/websockets transports
  # via lazy, feature-gated `require()` calls (see LazyModuleLoader) even
  # though this app never uses either — those packages simply aren't
  # installed. esbuild resolves every require() statically and fails the
  # whole bundle on them, so they must be excluded rather than bundled; the
  # calls are never actually reached at runtime for a plain HTTP Nest app.
  external_node_modules = [
    "@nestjs/microservices",
    "@nestjs/microservices/microservices-module",
    "@nestjs/websockets/socket-module",
    "class-transformer/storage",
    # argon2 ships a prebuilt native .node addon that esbuild can't inline;
    # externalizing makes Netlify's packager copy the real node_modules/argon2
    # (including the binary) into the function bundle instead.
    "argon2",
  ]

[[plugins]]
  package = "@netlify/plugin-nextjs"
